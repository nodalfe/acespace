# ═══════════════════════════════════════════════
# ACESPACE — Nginx 설정
# 위치: /etc/nginx/sites-available/acespace.co.kr
# ═══════════════════════════════════════════════

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name acespace.co.kr www.acespace.co.kr;

    # Certbot 인증용 (SSL 발급 시 필요)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Next.js 리버스 프록시
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name acespace.co.kr www.acespace.co.kr;

    # SSL 인증서 (Certbot이 자동 설정)
    # certbot --nginx 실행 후 아래 경로가 자동 채워짐
    ssl_certificate     /etc/letsencrypt/live/acespace.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/acespace.co.kr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "origin-when-cross-origin" always;

    # Next.js 리버스 프록시
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js 정적 파일 캐싱
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # public 폴더 정적 파일
    location /favicon.ico {
        proxy_pass http://127.0.0.1:3000;
        expires 30d;
        access_log off;
    }

    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
}
